name: Build SharpDump

on:
  push:
    branches: [master]   # repo bạn dùng 'master', không phải 'main'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # v3 → v4

      # windows-latest đã có .NET Framework + MSBuild sẵn
      # KHÔNG cần cài thêm NDP35SP1 hay dotnetfx35

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build with MSBuild
        run: msbuild ./SharpDump/SharpDump.csproj /p:Configuration=Release /p:Platform="Any CPU"

      - name: Upload artifact
        uses: actions/upload-artifact@v4   # v3 → v4
        with:
          name: SharpDump-Release
          path: ./SharpDump/bin/Release/SharpDump.exe
